<!DOCTYPE html>
<html>
<head>
<title>Draw Greeting</title>

<style>
    <a href="https://geebob-glitch.github.io/webs/" target="_blank">
Check out my websites here:
</a>
body{
    font-family: "Comic Sans MS", Comic Sans, cursive;
    text-align: center;
    color: black;
}

input, select{
    padding: 8px;
    margin: 5px;
    border: 4px solid darkgreen;
}

button{
    padding: 8px 12px;
    margin: 5px;
    border: 4px solid red;
}

canvas{
    border: 1px solid green;
    background: transparent;
}
</style>
</head>

<body>

<h2>Draw Greeting</h2>

<input id="note" placeholder="Enter your note">
<input id="name" placeholder="Enter your name">

<select id="fontSelect">
<option value="Georgia">Georgia</option>
<option value="Arial">Arial</option>
<option value="Verdana">Verdana</option>
<option value="'Comic Sans MS', cursive">Comic Sans MS</option>
<option value="Tahoma">Tahoma</option>
<option value="'Courier New', monospace">Courier New</option>
<option value="'Times New Roman', serif">Times New Roman</option>
<option value="Impact, sans-serif">Impact</option>
<option value="'Lucida Console', monospace">Lucida Console</option>
<option value="'Palatino Linotype', serif">Palatino Linotype</option>
<option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
<option value="'Brush Script MT', cursive">Brush Script MT</option>
</select>

<input type="color" id="colorPicker" value="#ff0000">

<button onclick="start()">Start</button>

<br><br>

<canvas id="canvas" width="1000" height="500"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let text = "";
let x = 0;
let y = 0;
let dx = 2;
let dy = 2;
let running = false;

const fontSize = 25;
let fontFamily = "Georgia";
let fontColor = "#ff0000";

function start(){
    const name = document.getElementById("name").value;
    const note = document.getElementById("note").value;
    text = note + " " + name;

    ctx.font = `${fontSize}px ${fontFamily}`;
    x = (canvas.width - ctx.measureText(text).width) / 2;
    y = canvas.height / 2;

    running = true;
}

function updateStyles(){
    fontFamily = document.getElementById("fontSelect").value;
    fontColor = document.getElementById("colorPicker").value;
}

function draw(){
    updateStyles();

    // Clear canvas (transparent)
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(running){
        ctx.font = `${fontSize}px ${fontFamily}`;
        ctx.fillStyle = fontColor;
        ctx.fillText(text,x,y);

        x += dx;
        y += dy;

        if(x < 0 || x > canvas.width - ctx.measureText(text).width){
            dx *= -1;
        }

        if(y < fontSize || y > canvas.height){
            dy *= -1;
        }
    }

    requestAnimationFrame(draw);
}

draw();
</script>


</body>
</html>
