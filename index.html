<!DOCTYPE html>
<html>
<head>
<title>Draw Greeting</title>

<style>
body{
    font-family: "Comic Sans MS", Comic Sans, cursive;
    text-align: center;
    background-color: white;
}

input, select{
    padding: 8px;
    margin: 5px;
    border: 4px solid red;
    background-color: white;
}

button{
    padding: 8px 12px;
    margin: 5px;
    border: 4px solid red;
}

canvas{
    border: 5px solid green;
    background-color: white;
}
</style>

</head>

<body>

<h2>Draw Greeting</h2>

<input id="note" placeholder="Enter your note">
<input id="name" placeholder="Enter your name">

<!-- Font selection dropdown -->
<select id="fontSelect">
    <option value="17px Georgia">Georgia</option>
    <option value="17px Arial">Arial</option>
    <option value="17px Verdana">Verdana</option>
    <option value="17px 'Comic Sans MS', cursive">Comic Sans MS</option>
    <option value="17px Tahoma">Tahoma</option>
</select>

<!-- Font color picker -->
<input type="color" id="colorPicker" value="#ff0000">

<button onclick="start()">Start</button>

<br><br>

<canvas id="canvas" width="1000" height="500"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let text = "";
let x = 100;
let y = 100;
let dx = 2;
let dy = 2;
let running = false;
let font = "17px Georgia";
let fontColor = "#ff0000";

function randomColor(){
    const r = Math.floor(Math.random()*255);
    const g = Math.floor(Math.random()*255);
    const b = Math.floor(Math.random()*255);
    return `rgb(${r},${g},${b})`;
}

function start(){
    const name = document.getElementById("name").value;
    const note = document.getElementById("note").value;
    text = note + " " + name;

    // Get selected font
    font = document.getElementById("fontSelect").value;

    // Get selected color
    fontColor = document.getElementById("colorPicker").value;

    running = true;
}

function draw(){
    ctx.fillStyle = "white";
    ctx.fillRect(0,0,1000,500);

    if(running){
        // Use chosen font and color
        ctx.font = font;
        ctx.fillStyle = fontColor;
        ctx.fillText(text,x,y);

        x += dx;
        y += dy;

        if(x < 0 || x > canvas.width - 50){
            dx *= -1;
        }

        if(y < 20 || y > canvas.height){
            dy *= -1;
        }
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
